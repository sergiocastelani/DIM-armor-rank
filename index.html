<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsolete Inventary Items</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="file"] {
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .summary {
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #e74c3c;
        }
        /* Estilos da Árvore */
        .familia-tree {
            margin-bottom: 30px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .vencedor-node {
            background-color: #d4edda;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #c3e6cb;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            transition: background-color 0.2s;
            position: relative;
        }
        .vencedor-node:hover {
            background-color: #c3e6cb;
        }
        .vencedor-node::after {
            content: "📋 Clique para copiar os IDs";
            position: absolute;
            right: 15px;
            font-size: 0.85em;
            color: #155724;
            opacity: 0.7;
        }
        .vencedor-checkbox {
            transform: scale(1.5);
            margin-right: 5px;
            cursor: pointer;
        }
        .vencedor-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .vencedor-stats {
            display: flex;
            gap: 15px;
            font-size: 0.95em;
        }
        .obsoletos-children {
            padding: 15px 15px 15px 40px;
            background-color: #fafafa;
            border-left: 3px dashed #bdc3c7;
            margin-left: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .stat-strong {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Localizador de Peças Obsoletas</h1>
    
    <div class="controls">
        <input type="file" id="csvFileInput" accept=".csv" />
        <button onclick="processarCSV()">Começar Processamento</button>
    </div>

    <div id="resultadoContainer"></div>
</div>

<script>
    const statNames = ['weapons', 'health', 'class', 'grenade', 'super', 'melee'];

    function processarCSV() {
        const fileInput = document.getElementById('csvFileInput');
        if (fileInput.files.length === 0) {
            alert('Por favor, selecione um arquivo CSV primeiro.');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            processarDados(text);
        };

        reader.readAsText(file);
    }

    function processarDados(csvText) {
        const linhas = parseCSV(csvText);
        if (linhas.length < 2) {
            alert("O arquivo CSV parece estar vazio ou não possui dados suficientes.");
            return;
        }

        const cabecalhos = linhas[0];
        const items = [];

        for (let i = 1; i < linhas.length; i++) {
            if (linhas[i].length === 0 || (linhas[i].length === 1 && linhas[i][0] === "")) continue;
            let obj = {};
            cabecalhos.forEach((header, index) => {
                obj[header] = linhas[i][index] ? linhas[i][index].trim() : '';
            });
            items.push(obj);
        }

        // 1. Remover todos os itens com raridade "Exotic"
        const itemsNaoExoticos = items.filter(item => {
            const tier = obterValorColuna(item, ['rarity', 'raridade']);
            return tier.toLowerCase() !== 'exotic';
        });

        const grupos = {};

        // 2, 3, 4, 5. Agrupamento
        itemsNaoExoticos.forEach(item => {
            let stats = statNames.map(sn => {
                let valor = parseFloat(obterValorColunaBase(item, sn) || 0);
                return { name: sn, value: valor };
            });

            stats.sort((a, b) => b.value - a.value);
            
            let top1 = stats[0].name;
            let top2 = stats[1].name;
            let top3 = stats[2].name;

            let tipo = obterValorColuna(item, ['type', 'tipo']);
            let seasonMod = obterValorColuna(item, ['seasonal mod', 'tipo']);
            let equipavel = obterValorColuna(item, ['equippable', 'personagem', 'class']);

            let chaveGrupo = `${equipavel}|${tipo}|${seasonMod}|${top1}|${top2}|${top3}`;

            if (!grupos[chaveGrupo]) {
                grupos[chaveGrupo] = [];
            }
            grupos[chaveGrupo].push(item);
        });

        const familias = [];

        // 6 e 7. Separando Vencedor e Obsoletos
        for (let chave in grupos) {
            let grupo = grupos[chave];

            // Só processamos grupos que tenham pelo menos 2 itens (1 vencedor e 1+ obsoletos)
            if (grupo.length > 1) {
                grupo.sort((a, b) => {
                    let totalA = parseFloat(obterValorColunaBase(a, 'total') || 0);
                    let totalB = parseFloat(obterValorColunaBase(b, 'total') || 0);
                    return totalB - totalA; // Ordem decrescente
                });

                // O primeiro item é o vencedor daquela árvore
                let vencedor = grupo[0];
                // Os restantes são os obsoletos (nodos filhos)
                let obsoletos = grupo.slice(1);

                familias.push({
                    vencedor: vencedor,
                    obsoletos: obsoletos
                });
            }
        }

        // Ordena a lista de famílias pelo campo "Equippable" do vencedor
        familias.sort((a, b) => {
            let eqA = obterValorColuna(a.vencedor, ['equippable', 'personagem', 'class']);
            let eqB = obterValorColuna(b.vencedor, ['equippable', 'personagem', 'class']);
            return eqA.localeCompare(eqB);
        });

        mostrarResultados(familias);
    }

    function copiarIDs(familia) {
        const idVencedor = obterValorColuna(familia.vencedor, ['id', 'item id', 'instance id']);
        const idsObsoletos = familia.obsoletos.map(obs => `id:${obterValorColuna(obs, ['id', 'item id', 'instance id'])}`).join(' or ');
        
        const copyString = `id:${idVencedor} or ${idsObsoletos}`;
        
        navigator.clipboard.writeText(copyString).then(() => {
            alert(`IDs copiados com sucesso!\n\n${copyString}`);
        }).catch(err => {
            console.error('Erro ao copiar para o clipboard: ', err);
            alert('Falha ao copiar os IDs. Verifique as permissões do navegador.');
        });
    }

    function mostrarResultados(familias) {
        const container = document.getElementById('resultadoContainer');
        container.innerHTML = '';

        if (familias.length === 0) {
            container.innerHTML = '<p>Nenhum item obsoleto encontrado com as regras especificadas.</p>';
            return;
        }

        let totalObsoletos = familias.reduce((acc, f) => acc + f.obsoletos.length, 0);

        const summary = document.createElement('div');
        summary.className = 'summary';
        summary.innerText = `Árvores geradas: ${familias.length} | Total de itens obsoletos: ${totalObsoletos}`;
        container.appendChild(summary);

        familias.forEach((familia, index) => {
            const v = familia.vencedor;
            const checkboxId = `chk-vencedor-${index}`;
            
            // Container da árvore
            const treeContainer = document.createElement('div');
            treeContainer.className = 'familia-tree';

            // Nodo Raiz (Vencedor)
            const rootNode = document.createElement('div');
            rootNode.className = 'vencedor-node';
            rootNode.title = "Clique para copiar o ID do vencedor e de seus obsoletos";
            
            // Evento de clique para copiar e marcar o checkbox
            rootNode.onclick = (e) => {
                // Marca o checkbox como true
                const checkbox = document.getElementById(checkboxId);
				if (e.target == checkbox)
					return;
                if(checkbox) checkbox.checked = true;
                
                // Se o usuário clicar direto no checkbox, evita que o alert interrompa o toggle natural
                if (e.target.type !== 'checkbox') {
                    copiarIDs(familia);
                } else {
                    // O setTimeout garante que o toggle do checkbox renderize antes do alert travar a tela
                    setTimeout(() => copiarIDs(familia), 10);
                }
            };
            
            rootNode.innerHTML = `
                <input type="checkbox" id="${checkboxId}" class="vencedor-checkbox" title="Marcado se já copiado">
                <div class="vencedor-badge">VENCEDOR ROOT</div>
                <div class="vencedor-stats">
                    <strong>${obterValorColuna(v, ['name', 'nome'])}</strong> | 
                    <span>Tipo: ${obterValorColuna(v, ['type', 'tipo'])}</span> | 
                    <span>Equipável: ${obterValorColuna(v, ['equippable', 'personagem', 'class'])}</span> | 
                    <span>Power: ${obterValorColuna(v, ['power', 'poder'])}</span> | 
                    <span style="color:#d35400; font-weight:bold;">Total Base: ${obterValorColunaBase(v, 'total')}</span>
                </div>
            `;
            
            // Nodos Filhos (Obsoletos)
            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'obsoletos-children';
            
            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Nome do Obsoleto</th>
                        <th>Tipo</th>
                        <th>Power</th>
                        <th>Health</th>
                        <th>Melee</th>
                        <th>Grenade</th>
                        <th>Super</th>
                        <th>Class</th>
                        <th>Weapons</th>
                        <th>Total Base</th>
                    </tr>
                </thead>
                <tbody>
                    ${familia.obsoletos.map(obs => `
                        <tr>
                            <td>${obterValorColuna(obs, ['name', 'nome'])}</td>
                            <td>${obterValorColuna(obs, ['type', 'tipo'])}</td>
                            <td>${obterValorColuna(obs, ['power', 'poder'])}</td>
                            <td>${obterValorColunaBase(obs, 'health')}</td>
                            <td>${obterValorColunaBase(obs, 'melee')}</td>
                            <td>${obterValorColunaBase(obs, 'grenade')}</td>
                            <td>${obterValorColunaBase(obs, 'super')}</td>
                            <td>${obterValorColunaBase(obs, 'class')}</td>
                            <td>${obterValorColunaBase(obs, 'weapons')}</td>
                            <td class="stat-strong">${obterValorColunaBase(obs, 'total')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            childrenContainer.appendChild(table);
            treeContainer.appendChild(rootNode);
            treeContainer.appendChild(childrenContainer);
            container.appendChild(treeContainer);
        });
    }

    // Localiza uma coluna usando sinônimos flexíveis (ex: name, nome, id)
    function obterValorColuna(item, possiveisNomes) {
        const chaves = Object.keys(item);
        for (let pn of possiveisNomes) {
            const achou = chaves.find(k => k.toLowerCase() === pn.toLowerCase());
            if (achou) return item[achou];
        }
        return '';
    }

    function obterValorColunaBase(item, nomeDoAtributo) {
        const chaves = Object.keys(item);
        let chaveAlvo = chaves.find(k => k.toLowerCase().includes(nomeDoAtributo) && k.toLowerCase().includes('base'));
        
        if (!chaveAlvo) {
            chaveAlvo = chaves.find(k => k.toLowerCase().includes(nomeDoAtributo));
        }

        return chaveAlvo ? item[chaveAlvo] : '0';
    }

    function parseCSV(str) {
        const arr = [];
        let quote = false;
        let col, c;

        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';

            if (cc == '"' && quote && nc == '"') { 
                arr[row][col] += cc; ++c; continue; 
            }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }

            arr[row][col] += cc;
        }
        return arr;
    }
</script>

</body>
</html>
