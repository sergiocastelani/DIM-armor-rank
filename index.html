<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsolete Inventary Items</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            border: 2px solid transparent;
        }
        .custom-file-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .custom-file-upload:active {
            transform: translateY(0px);
        }
        .file-name {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            font-style: italic;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .summary {
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #e74c3c;
        }
        /* Tree Styles */
        .family-tree {
            margin-bottom: 30px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .winner-node {
            background-color: #d4edda;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #c3e6cb;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            transition: background-color 0.2s;
            position: relative;
        }
        .winner-node:hover {
            background-color: #c3e6cb;
        }
        .winner-node::after {
            content: "📋 Click to copy the DIM IDs of all items in this category";
            position: absolute;
            right: 15px;
            font-size: 0.85em;
            color: #155724;
            opacity: 0.7;
        }
        .winner-checkbox {
            transform: scale(1.5);
            margin-right: 5px;
            cursor: pointer;
        }
        .winner-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .winner-stats {
            display: flex;
            gap: 15px;
            font-size: 0.95em;
        }
        .obsolete-children {
            padding: 15px 15px 15px 40px;
            background-color: #fafafa;
            border-left: 3px dashed #bdc3c7;
            margin-left: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .stat-strong {
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-cell-alignment {
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Armor Ranking</h1>
    
    <div class="controls">
        <span>Select a CSV file from DIM Organizer to start processing:</span>
        <label for="csvFileInput" class="custom-file-upload">
            📁 Choose CSV File
        </label>
        <input type="file" id="csvFileInput" accept=".csv" onchange="updateFileName()"/>
        <div id="fileName" class="file-name">No file chosen</div>
        <button onclick="processCSV()">Start Processing</button>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    const statNames = ['super', 'health', 'melee', 'grenade', 'class', 'weapons'];

    function updateFileName() {
        const fileInput = document.getElementById('csvFileInput');
        const fileNameDisplay = document.getElementById('fileName');
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = fileInput.files[0].name;
            fileNameDisplay.style.color = '#28a745';
            fileNameDisplay.style.fontWeight = 'bold';
        } else {
            fileNameDisplay.textContent = 'No file chosen';
            fileNameDisplay.style.color = '#555';
            fileNameDisplay.style.fontWeight = 'normal';
        }
    }

    function processCSV() {
        const fileInput = document.getElementById('csvFileInput');
        if (fileInput.files.length === 0) {
            alert('Please select a CSV file from DIM Organizer first.');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            processData(text);
        };

        reader.readAsText(file);
    }

    function processData(csvText) {
        const lines = parseCSV(csvText);
        if (lines.length < 2) {
            alert("The CSV file appears to be empty or does not have enough data.");
            return;
        }

        const headers = lines[0];
        const items = [];

        for (let i = 1; i < lines.length; i++) {
            if (lines[i].length === 0 || (lines[i].length === 1 && lines[i][0] === "")) continue;
            let obj = {};
            headers.forEach((header, index) => {
                obj[header] = lines[i][index] ? lines[i][index].trim() : '';
            });
            items.push(obj);
        }

        // Remove all items with "Exotic" rarity
        const nonExoticItems = items.filter(item => {
            const tier = getColumnValue(item, 'rarity');
            return tier.toLowerCase() !== 'exotic';
        });

        const groups = {};

        // Grouping
        nonExoticItems.forEach(item => {
            let stats = statNames.map(sn => {
                let value = parseFloat(getBaseColumnValue(item, sn) || 0);
                return { name: sn, value: value };
            });

            stats.sort((a, b) => b.value - a.value);
            
            let top1 = stats[0].name;
            let top2 = stats[1].name;
            let top3 = stats[2].name;

            let type = getColumnValue(item, 'type');
            let seasonMod = getColumnValue(item, 'seasonal mod');
            let equippable = getColumnValue(item, 'equippable');

            let groupKey = `${equippable}|${type}|${seasonMod}|${top1}|${top2}|${top3}`;

            if (!groups[groupKey]) {
                groups[groupKey] = [];
            }
            groups[groupKey].push(item);
        });

        const families = [];

        // Separating Winner and Obsolete items
        for (let key in groups) {
            let group = groups[key];

            // Only process groups that have at least 2 items (1 winner and 1+ obsolete)
            if (group.length > 1) {
                group.sort((a, b) => {
                    let totalA = parseFloat(getBaseColumnValue(a, 'total') || 0);
                    let totalB = parseFloat(getBaseColumnValue(b, 'total') || 0);
                    return totalB - totalA; // Descending order
                });

                // The first item is the winner of that tree
                let winner = group[0];
                // The remaining ones are the obsolete items (child nodes)
                let obsoletes = group.slice(1);

                families.push({
                    winner: winner,
                    obsoletes: obsoletes
                });
            }
        }

        // Sort the list of families by the winner's "Equippable" field
        families.sort((a, b) => {
            let eqA = getColumnValue(a.winner, 'equippable');
            let eqB = getColumnValue(b.winner, 'equippable');
            return eqA.localeCompare(eqB);
        });

        showResults(families);
    }

    function copyIDs(family) {
        const winnerID = getColumnValue(family.winner, 'id');
        const obsoleteIDs = family.obsoletes.map(obs => `id:${getColumnValue(obs, 'id')}`).join(' or ');
        
        const copyString = `id:${winnerID} or ${obsoleteIDs}`;
        
        navigator.clipboard.writeText(copyString).then(() => {
            console.log(`IDs copied successfully!\n\n${copyString}`);
        }).catch(err => {
            console.error('Error copying to clipboard: ', err);
            alert('Failed to copy IDs. Check browser permissions.');
        });
    }

    function showResults(families) {
        const container = document.getElementById('resultContainer');
        container.innerHTML = '';

        if (families.length === 0) {
            container.innerHTML = '<p>No obsolete items found with the specified rules.</p>';
            return;
        }

        let totalObsoletes = families.reduce((acc, f) => acc + f.obsoletes.length, 0);

        const summary = document.createElement('div');
        summary.className = 'summary';
        summary.innerText = `Groups identified: ${families.length} | Total obsolete items: ${totalObsoletes}`;
        container.appendChild(summary);

        families.forEach((family, index) => {
            const w = family.winner;
            const checkboxId = `chk-winner-${index}`;
            
            // Tree container
            const treeContainer = document.createElement('div');
            treeContainer.className = 'family-tree';

            // Root Node (Winner)
            const rootNode = document.createElement('div');
            rootNode.className = 'winner-node';
            rootNode.title = "Click to copy the winner ID and its obsolete items";
            
            // Click event to copy and mark the checkbox
            rootNode.onclick = (e) => {
                // Mark the checkbox as true
                const checkbox = document.getElementById(checkboxId);
				if (e.target == checkbox)
					return;
                if(checkbox) checkbox.checked = true;
                
                // If the user clicks directly on the checkbox, prevent the alert from interrupting the natural toggle
                if (e.target.type !== 'checkbox') {
                    copyIDs(family);
                } else {
                    // The setTimeout ensures the checkbox toggle renders before the alert freezes the screen
                    setTimeout(() => copyIDs(family), 10);
                }
            };
            
            rootNode.innerHTML = `
                <input type="checkbox" id="${checkboxId}" class="winner-checkbox" title="Checked if already copied">
                <div class="winner-badge">GROUP WINNER</div>
                    <div class="winner-stats">
                        <strong>${getColumnValue(w, 'name')}</strong> | 
                        <span>Type: ${getColumnValue(w, 'type')}</span> | 
                        <span>Equippable: ${getColumnValue(w, 'equippable')}</span> | 
                        <span>Power: ${getColumnValue(w, 'power')}</span> | 
                        <span style="color:#d35400; font-weight:bold;">Total Base: ${getBaseColumnValue(w, 'total')}</span>
                </div>
            `;
            
            // Child Nodes (Obsolete items)
            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'obsolete-children';
            
            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Obsolete Name</th>
                        <th>Type</th>
                        <th class="stat-cell-alignment">Power (${getColumnValue(family.winner, 'power')})</th>
                        <th class="stat-cell-alignment">Health (${getBaseColumnValue(family.winner, 'health')})</th>
                        <th class="stat-cell-alignment">Melee (${getBaseColumnValue(family.winner, 'melee')})</th>
                        <th class="stat-cell-alignment">Grenade (${getBaseColumnValue(family.winner, 'grenade')})</th>
                        <th class="stat-cell-alignment">Super (${getBaseColumnValue(family.winner, 'super')})</th>
                        <th class="stat-cell-alignment">Class (${getBaseColumnValue(family.winner, 'class')})</th>
                        <th class="stat-cell-alignment">Weapons (${getBaseColumnValue(family.winner, 'weapons')})</th>
                        <th class="stat-cell-alignment">Total Base (${getBaseColumnValue(family.winner, 'total')})</th>
                    </tr>
                </thead>
                <tbody>
                    ${family.obsoletes.map(obs => `
                        <tr>
                            <td>${getColumnValue(obs, 'name')}</td>
                            <td>${getColumnValue(obs, 'type')}</td>
                            <td class="stat-cell-alignment">${getColumnValue(obs, 'power')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'melee')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'health')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'grenade')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'super')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'class')}</td>
                            <td class="stat-cell-alignment">${getBaseColumnValue(obs, 'weapons')}</td>
                            <td class="stat-cell-alignment stat-strong">${getBaseColumnValue(obs, 'total')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            childrenContainer.appendChild(table);
            treeContainer.appendChild(rootNode);
            treeContainer.appendChild(childrenContainer);
            container.appendChild(treeContainer);
        });
    }

    // Locates a column
    function getColumnValue(item, possibleNames) {
        const keys = Object.keys(item);
        const found = keys.find(k => k.toLowerCase() === possibleNames.toLowerCase());
        if (found) return item[found];
        return '';
    }

    function getBaseColumnValue(item, attributeName) {
        const keys = Object.keys(item);
        let targetKey = keys.find(k => k.toLowerCase().includes(attributeName) && k.toLowerCase().includes('base'));
        if (!targetKey) {
            targetKey = keys.find(k => k.toLowerCase().includes(attributeName));
        }
        return targetKey ? item[targetKey] : '0';
    }

    function parseCSV(str) {
        const arr = [];
        let quote = false;
        let col, c;

        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';

            if (cc == '"' && quote && nc == '"') { 
                arr[row][col] += cc; ++c; continue; 
            }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }

            arr[row][col] += cc;
        }
        return arr;
    }
</script>

</body>
</html>
